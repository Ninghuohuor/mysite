<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" preserveAspectRatio="none">
  <defs>
    <filter id="paper-noise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.98 0 0 0 0 0.92 0 0 0 0 0.48 0 0 0 .13 0" result="tint"/>
      <feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
    </filter>
    <filter id="soft-shadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="13" flood-color="#000000" flood-opacity=".18"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity=".12"/>
    </filter>
    <linearGradient id="paper-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffbd2"/>
      <stop offset=".56" stop-color="#fff39b"/>
      <stop offset="1" stop-color="#f4dd6f"/>
    </linearGradient>
    <linearGradient id="edge-shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".35"/>
      <stop offset=".7" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".12"/>
    </linearGradient>
  </defs>
  <path d="M19 20 C125 13 240 18 342 15 C451 12 535 19 602 16 C597 89 605 171 598 239 C594 283 602 321 589 342 C440 350 293 340 148 346 C94 348 52 342 18 340 C24 239 12 139 19 20Z" fill="url(#paper-light)" filter="url(#soft-shadow)"/>
  <path d="M19 20 C125 13 240 18 342 15 C451 12 535 19 602 16 C597 89 605 171 598 239 C594 283 602 321 589 342 C440 350 293 340 148 346 C94 348 52 342 18 340 C24 239 12 139 19 20Z" fill="url(#paper-light)" filter="url(#paper-noise)"/>
  <path d="M19 20 C125 13 240 18 342 15 C451 12 535 19 602 16 C597 89 605 171 598 239 C594 283 602 321 589 342 C440 350 293 340 148 346 C94 348 52 342 18 340 C24 239 12 139 19 20Z" fill="url(#edge-shade)" opacity=".72"/>
  <path d="M525 318 C552 323 576 317 589 342 C560 338 539 336 515 344 C526 335 530 329 525 318Z" fill="#e0c762" opacity=".44"/>
</svg>
